global:
  resolve_timeout: 5m

route:
  receiver: slack-devops-alerts
  group_by:
    - alertname
    - service
    - job
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: slack-devops-alerts
      matchers:
        - severity=~"critical|warning|info"

receivers:
  - name: slack-devops-alerts
    slack_configs:
      - api_url: "__SLACK_WEBHOOK_URL__"
        channel: "#DevOps-Alerts"
        send_resolved: true
        title: "{{ template \"slack.default.title\" . }}"
        text: "{{ template \"slack.default.text\" . }}"
        color: "{{ if eq .Status \"firing\" }}{{ if eq .CommonLabels.severity \"critical\" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}"

inhibit_rules:
  - source_matchers:
      - alertname="ServerDown"
    target_matchers:
      - alertname=~"HighCPU.*|HighMemory.*|Disk.*|HighRequestLatency|FastBurnRate|SlowBurnRate"
    equal:
      - instance


templates:
  - /etc/alertmanager/templates/*.tmpl
