global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: sample-app
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - sample-app:8000

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: dora-exporter
    scrape_interval: 60s
    static_configs:
      - targets:
          - dora-exporter:9101

  - job_name: blackbox
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://sample-app:8000/health
          - http://prometheus:9090/-/ready
          - http://grafana:3000/login
          - https://grafana.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
