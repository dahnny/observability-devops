groups:
  - name: slo-burn-rate
    rules:
      - alert: FastBurnRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total[5m])), 1)
          ) > 0.144
        for: 5m
        labels:
          severity: critical
          service: sample-app
        annotations:
          summary: "Fast error-budget burn detected for sample-app"
          current_value: "{{ $value | printf \"%.4f\" }}"
          dashboard_url: "http://localhost:3000/d/slo-error-budget/slo-error-budget"
          runbook_url: "runbooks/fast-burn.md"

      - alert: SlowBurnRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[1h]))
            /
            clamp_min(sum(rate(http_requests_total[1h])), 1)
          ) > 0.05
        for: 30m
        labels:
          severity: warning
          service: sample-app
        annotations:
          summary: "Slow error-budget burn detected for sample-app"
          current_value: "{{ $value | printf \"%.4f\" }}"
          dashboard_url: "http://localhost:3000/d/slo-error-budget/slo-error-budget"
          runbook_url: "runbooks/slow-burn.md"
