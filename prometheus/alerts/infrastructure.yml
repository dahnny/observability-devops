groups:
  - name: infrastructure
    rules:
      - alert: HighCPUWarning
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: node
        annotations:
          summary: "CPU usage is above 80%"
          current_value: "{{ $value | printf \"%.2f\" }}%"
          dashboard_url: "http://localhost:3000/d/node-exporter/node-exporter"
          runbook_url: "runbooks/high-cpu.md"

      - alert: HighCPUCritical
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: critical
          service: node
        annotations:
          summary: "CPU usage is above 90%"
          current_value: "{{ $value | printf \"%.2f\" }}%"
          dashboard_url: "http://localhost:3000/d/node-exporter/node-exporter"
          runbook_url: "runbooks/high-cpu.md"

      - alert: HighMemoryWarning
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: node
        annotations:
          summary: "Memory usage is above 80%"
          current_value: "{{ $value | printf \"%.2f\" }}%"
          dashboard_url: "http://localhost:3000/d/node-exporter/node-exporter"
          runbook_url: "runbooks/high-memory.md"

      - alert: HighMemoryCritical
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: critical
          service: node
        annotations:
          summary: "Memory usage is above 90%"
          current_value: "{{ $value | printf \"%.2f\" }}%"
          dashboard_url: "http://localhost:3000/d/node-exporter/node-exporter"
          runbook_url: "runbooks/high-memory.md"

      - alert: DiskSpaceWarning
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 75
        for: 5m
        labels:
          severity: warning
          service: node
        annotations:
          summary: "Disk usage is above 75%"
          current_value: "{{ $value | printf \"%.2f\" }}%"
          dashboard_url: "http://localhost:3000/d/node-exporter/node-exporter"
          runbook_url: "runbooks/disk-space.md"

      - alert: DiskSpaceCritical
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 90
        for: 10m
        labels:
          severity: critical
          service: node
        annotations:
          summary: "Disk usage is above 90%"
          current_value: "{{ $value | printf \"%.2f\" }}%"
          dashboard_url: "http://localhost:3000/d/node-exporter/node-exporter"
          runbook_url: "runbooks/disk-space.md"

      - alert: ServerDown
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
          service: blackbox
        annotations:
          summary: "Blackbox probe is failing for {{ $labels.instance }}"
          current_value: "{{ $value | printf \"%.0f\" }}"
          dashboard_url: "http://localhost:3000/d/blackbox-monitoring/blackbox-monitoring"
          runbook_url: "runbooks/server-down.md"

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{status_code!~"5.."}[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
          service: sample-app
        annotations:
          summary: "Sample app successful request p95 latency is above 500ms"
          current_value: "{{ $value | printf \"%.3f\" }}s"
          dashboard_url: "http://localhost:3000/d/unified-observability/unified-observability"
          runbook_url: "runbooks/slow-burn.md"
